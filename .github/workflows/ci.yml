name: CI - Build and Test Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t voyage-analytics-api -f docker/Dockerfile .

      - name: Run container and test health endpoint
        run: |
          docker run -d -p 5000:5000 --name test-container voyage-analytics-api
          sleep 10
          curl --fail http://localhost:5000/ || (docker logs test-container && exit 1)
          docker stop test-container
